<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perturbation Framework — Mechanism Classifier</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
    background: #0a0a0f;
    color: #c8c8d0;
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container { max-width: 960px; margin: 0 auto; }

  .header { margin-bottom: 28px; border-bottom: 1px solid #1a1a2e; padding-bottom: 16px; }
  .header h1 {
    font-size: 18px; font-weight: 600; color: #e0e0e8;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
  .header p { font-size: 11px; color: #666; margin-top: 6px; letter-spacing: 0.03em; }

  .layout { display: flex; gap: 20px; flex-wrap: wrap; }
  .left-panel { flex: 1 1 400px; min-width: 280px; }
  .right-panel { flex: 1 1 440px; min-width: 300px; }

  .results-box {
    position: sticky; top: 16px;
    background: #0d0d18; border: 1px solid #1a1a2e;
    border-radius: 6px; padding: 20px;
  }

  /* Category buttons */
  .cat-btn {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding: 10px 12px; background: #0d0d15; border: 1px solid #1a1a2e;
    border-radius: 4px; color: #a0a0b0; cursor: pointer; font-size: 11px;
    font-family: inherit; letter-spacing: 0.06em; text-transform: uppercase;
    transition: background 0.15s; margin-bottom: 2px;
  }
  .cat-btn:hover { background: #111120; }
  .cat-btn.open { background: #111120; }

  .cat-badge {
    background: #E84855; color: #fff; border-radius: 10px;
    padding: 1px 7px; font-size: 10px; font-weight: 700;
  }

  .cat-list {
    padding: 4px 0; background: #0a0a12;
    border-left: 1px solid #1a1a2e; border-right: 1px solid #1a1a2e;
    border-bottom: 1px solid #1a1a2e; border-radius: 0 0 4px 4px;
    display: none;
  }
  .cat-list.open { display: block; }

  .sign-btn {
    display: block; width: 100%; text-align: left; padding: 7px 14px;
    background: transparent; border: none;
    border-left: 3px solid transparent;
    color: #888; cursor: pointer; font-size: 12px; font-family: inherit;
    transition: all 0.1s; line-height: 1.4;
  }
  .sign-btn:hover { color: #bbb; }
  .sign-btn.active {
    background: #1a1a30; border-left-color: #E84855; color: #e0e0e8;
  }
  .sign-btn .dot { margin-right: 8px; opacity: 0.3; }
  .sign-btn.active .dot { opacity: 1; }

  .clear-btn {
    margin-top: 12px; padding: 8px 16px; background: transparent;
    border: 1px solid #333; border-radius: 4px; color: #666;
    cursor: pointer; font-size: 11px; font-family: inherit; letter-spacing: 0.04em;
  }
  .clear-btn:hover { border-color: #555; color: #999; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 1px solid #1a1a2e; }
  .tab-btn {
    padding: 8px 16px; font-size: 10px; font-family: inherit;
    text-transform: uppercase; letter-spacing: 0.06em;
    background: transparent; border: none; cursor: pointer;
    color: #555; border-bottom: 2px solid transparent;
  }
  .tab-btn.active { color: #e0e0e8; }
  .tab-btn.active.mech { border-bottom-color: #E84855; }
  .tab-btn.active.drug { border-bottom-color: #F9A03F; }

  /* Section label */
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
    color: #555; margin-bottom: 16px;
  }
  .section-label.small { color: #444; margin-bottom: 8px; }

  /* Primary hypothesis box */
  .primary-box {
    padding: 12px 14px; background: #111125; border-radius: 4px;
    margin-bottom: 16px; border-left: 3px solid;
  }
  .primary-box .label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.06em; }
  .primary-box .name { font-size: 16px; font-weight: 700; margin-top: 4px; }
  .primary-box .desc { font-size: 11px; color: #888; margin-top: 2px; }

  /* Score bars */
  .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .score-label { width: 110px; font-size: 10px; text-align: right; flex-shrink: 0; letter-spacing: 0.02em; }
  .score-track { flex: 1; height: 16px; background: #111; border-radius: 2px; overflow: hidden; position: relative; }
  .score-bar { position: absolute; top: 0; height: 100%; border-radius: 2px; transition: width 0.3s ease; }
  .score-val { width: 32px; font-size: 11px; text-align: right; flex-shrink: 0; }

  /* Confidence note */
  .confidence-note {
    margin-top: 16px; padding: 10px 12px; background: #0a0a12;
    border-radius: 4px; font-size: 10px; color: #555; line-height: 1.5;
  }

  /* Drug match */
  .disclaimer {
    padding: 10px 12px; background: #1a1210; border: 1px solid #3d2a1a;
    border-radius: 4px; margin-bottom: 16px; font-size: 10px; color: #a08060; line-height: 1.5;
  }
  .uncertain {
    padding: 20px 16px; background: #111118; border-radius: 4px; text-align: center;
  }
  .uncertain .title { font-size: 14px; color: #888; margin-bottom: 8px; }
  .uncertain .desc { font-size: 11px; color: #555; line-height: 1.5; }

  .drug-card {
    padding: 12px 14px; background: #0e0e18; border: 1px solid #1a1a2e;
    border-radius: 4px; border-left: 3px solid transparent; margin-bottom: 8px;
  }
  .drug-card.top { background: #111125; border-color: #2a2a44; border-left-color: #F9A03F; }
  .drug-card .drug-header { display: flex; justify-content: space-between; align-items: baseline; }
  .drug-card .drug-name { font-size: 13px; font-weight: 500; color: #c0c0cc; }
  .drug-card.top .drug-name { font-weight: 700; color: #F9A03F; }
  .drug-card .drug-class { font-size: 10px; color: #555; margin-left: 8px; }
  .drug-card .drug-pct { font-size: 11px; font-weight: 700; }
  .drug-card .match-track { height: 4px; background: #111; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .drug-card .match-bar { height: 100%; border-radius: 2px; transition: width 0.3s ease; background: #555; }
  .drug-card.top .match-bar { background: #F9A03F; }
  .drug-card .drug-meta { display: flex; gap: 16px; margin-top: 8px; font-size: 10px; color: #666; flex-wrap: wrap; }
  .drug-card .drug-notes { font-size: 10px; color: #555; margin-top: 6px; line-height: 1.5; font-style: italic; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    padding: 3px 8px; background: #1a1a2a; border-radius: 3px;
    font-size: 10px; color: #999; cursor: pointer; border: 1px solid #222;
    font-family: inherit;
  }
  .chip:hover { border-color: #444; color: #ccc; }

  .empty-state { color: #444; font-size: 12px; line-height: 1.6; padding: 20px 0; }

  .unexplained-note {
    margin-top: 12px; padding: 10px 12px; background: #0a0a12;
    border-radius: 4px; font-size: 10px; color: #555; line-height: 1.5;
  }
  .unexplained-note span { color: #777; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Perturbation Framework</h1>
    <p>Mechanism classifier — select observed signs below</p>
  </div>

  <div class="layout">
    <div class="left-panel">
      <div style="margin-bottom:12px">
        <input id="signSearch" type="text" placeholder="Search signs, patterns, clues..." style="width:100%;padding:10px 12px;background:#0d0d18;border:1px solid #1a1a2e;border-radius:4px;color:#c8c8d0;font-family:inherit;font-size:12px;outline:none">
      </div>
      <div id="signPanel"></div>
    </div>
    <div class="right-panel">
      <div class="results-box">
        <div class="tabs">
          <button class="tab-btn mech active" data-tab="mech">Mechanism Profile</button>
          <button class="tab-btn drug" data-tab="drug">Drug Match</button>
        </div>
        <div id="mechTab"></div>
        <div id="drugTab" style="display:none"></div>
        <div id="chipsSection"></div>
      </div>
    </div>
  </div>
</div>

const CATEGORIES = {eyes:"Eyes",vitals:"Vitals",skin:"Skin",neuro:"Neuromuscular",behavior:"Mental / Behavioral",other:"Other Signs"};

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════

const selected = new Set();
const openCats = new Set(["eyes","vitals"]);
let activeTab = "mech";
let signSearch = "";

// ════════════════════════════════════════════════════════════
// LOGIC
// ════════════════════════════════════════════════════════════

function getSign(sid) {
  return SIGNS.find(x => x.id === sid);
}

function getHallmarksForDrug(drug) {
  return Object.entries(drug.expected)
    .filter(([_, w]) => w >= 3)
    .map(([sid]) => sid);
}

function calcMechScores() {
  const rows = Object.keys(MECHANISMS).map(mid => {
    const supporting = [];
    const conflicting = [];
    let score = 0;
    selected.forEach(sid => {
      const s = getSign(sid);
      if (!s || !(mid in s.scores)) return;
      const w = s.scores[mid];
      score += w;
      if (w > 0) supporting.push({sid, w, label: s.label});
      if (w < 0) conflicting.push({sid, w, label: s.label});
    });
    supporting.sort((a,b) => b.w - a.w);
    conflicting.sort((a,b) => a.w - b.w);
    const positive = supporting.reduce((n, x) => n + x.w, 0);
    const negative = conflicting.reduce((n, x) => n + Math.abs(x.w), 0);
    const net = score;
    const confidence = positive <= 0 ? 0 : positive / Math.max(positive + negative, 1);
    return {mid, score, net, positive, negative, confidence, supporting, conflicting};
  });
  return rows.sort((a,b) => b.score - a.score);
}

function detectRedFlags() {
  const flags = [];
  const has = sid => selected.has(sid);
  if (has("resp_depression") && has("sedation")) {
    flags.push("Respiratory depression + sedation is a major danger pattern.");
  }
  if (has("hyperthermia") && (has("clonus") || has("hyperreflexia") || has("myoclonus"))) {
    flags.push("Hyperthermia + clonus/hyperreflexia can indicate severe serotonergic toxicity.");
  }
  if (has("bronchorrhea") || (has("salivation_excess") && has("bradycardia") && has("miosis"))) {
    flags.push("Secretions + cholinergic features can become life-threatening quickly.");
  }
  if (has("hyperthermia") && has("agitation") && has("diaphoresis")) {
    flags.push("Hyperthermia + agitation + diaphoresis can represent a dangerous stimulant or mixed toxic state.");
  }
  return flags;
}

function matchDrugs() {
  if (selected.size === 0) return [];
  const arr = Array.from(selected);
  return DRUGS.map(drug => {
    let matchedWeight = 0, maxPossible = 0, matchedSigns = 0, contradictions = 0;
    const totalExpected = Object.keys(drug.expected).length;
    const supported = [];
    const conflicts = [];
    Object.entries(drug.expected).forEach(([sid, w]) => {
      maxPossible += w;
      if (selected.has(sid)) {
        matchedWeight += w;
        matchedSigns++;
        const s = getSign(sid);
        supported.push({sid, w, label: s ? s.label : sid});
      }
    });
    drug.contraindicated.forEach(sid => {
      if (selected.has(sid)) {
        contradictions++;
        const s = getSign(sid);
        conflicts.push({sid, label: s ? s.label : sid});
      }
    });
    const hallmarks = getHallmarksForDrug(drug);
    const matchedHallmarks = hallmarks.filter(sid => selected.has(sid));
    const hallmarkRate = hallmarks.length ? matchedHallmarks.length / hallmarks.length : 0;
    const selectedRelevance = arr.filter(s => s in drug.expected).length / Math.max(arr.length, 1);
    const unexplainedIds = arr.filter(s => !(s in drug.expected) && !drug.contraindicated.includes(s));
    const unexplained = unexplainedIds.length;
    const coverage = maxPossible > 0 ? matchedWeight / maxPossible : 0;
    const completeness = totalExpected > 0 ? matchedSigns / totalExpected : 0;
    const contradictionPenalty = contradictions * 0.22;
    const unexplainedPenalty = Math.min(unexplained * 0.04, 0.24);
    const score01 = Math.max(
      0,
      (coverage * 0.45) +
      (selectedRelevance * 0.2) +
      (hallmarkRate * 0.25) +
      (completeness * 0.1) -
      contradictionPenalty -
      unexplainedPenalty
    );
    const composite = (score01 * 100) + (matchedWeight * 0.6) - (contradictions * 8) - (unexplained * 1.5);
    return {
      ...drug,
      matchedWeight,
      maxPossible,
      matchedSigns,
      contradictions,
      coverage: score01,
      rawCoverage: coverage,
      selectedRelevance,
      completeness,
      hallmarkRate,
      hallmarks,
      matchedHallmarks,
      supported,
      conflicts,
      unexplainedIds,
      composite,
      totalExpected
    };
  }).filter(d => d.composite > 8).sort((a,b) => b.composite - a.composite);
}

function confidenceLabel(s) {
  if (s >= 0.85) return "Very high";
  if (s >= 0.65) return "High";
  if (s >= 0.4) return "Moderate";
  if (s > 0) return "Low";
  return "Against";
}

function mechanismPatternNote(sorted) {
  if (sorted.length < 2 || selected.size === 0) return "";
  const top = sorted[0];
  const second = sorted[1];
  if (top.score <= 0) return "No mechanism is strongly supported yet. Add more discriminating signs.";
  const gap = top.score - second.score;
  if (gap <= 2 && second.score > 0) {
    return `Mixed or ambiguous profile - ${MECHANISMS[top.mid].label} and ${MECHANISMS[second.mid].label} are close.`;
  }
  if (top.confidence < 0.6) {
    return "Pattern is forming, but there is meaningful conflicting evidence.";
  }
  return "Pattern coherence is good. Hallmark signs and contradictions are the main tie-breakers.";
}

// ════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════

function render() {
  renderSigns();
  renderResults();
}

function renderSigns() {
  const panel = document.getElementById("signPanel");
  const query = signSearch.trim().toLowerCase();
  let html = "";
  Object.entries(CATEGORIES).forEach(([catId, catLabel]) => {
    const isOpen = openCats.has(catId);
    const rawSigns = SIGNS.filter(s => s.category === catId);
    const catSigns = query
      ? rawSigns.filter(s => s.label.toLowerCase().includes(query) || s.id.toLowerCase().includes(query))
      : rawSigns;
    if (!catSigns.length) return;
    const active = rawSigns.filter(s => selected.has(s.id)).length;
    html += `<button class="cat-btn ${isOpen?"open":""}" onclick="toggleCat('${catId}')">
      <span>${isOpen?"▾":"▸"} ${catLabel}</span>
      ${active > 0 ? `<span class="cat-badge">${active}</span>` : ""}
    </button>`;
    html += `<div class="cat-list ${isOpen?"open":""}">`;
    catSigns.forEach(s => {
      const a = selected.has(s.id);
      html += `<button class="sign-btn ${a?"active":""}" onclick="toggleSign('${s.id}')">
        <span class="dot">${a?"●":"○"}</span>${s.label}
      </button>`;
    });
    html += `</div>`;
  });
  if (!html) {
    html = `<div class="empty-state">No signs matched your search.</div>`;
  }
  if (selected.size > 0) {
    html += `<button class="clear-btn" onclick="clearAll()">Clear all (${selected.size} selected)</button>`;
  }
  panel.innerHTML = html;
}

function renderResults() {
  const sorted = calcMechScores();
  const maxScore = Math.max(...sorted.map(s => s.score), 1);
  const minScore = Math.min(...sorted.map(s => s.score), 0);
  const has = selected.size > 0;
  const redFlags = detectRedFlags();

  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.tab === activeTab);
  });

  const drugMatches = matchDrugs();
  const drugBtn = document.querySelector('.tab-btn.drug');
  drugBtn.textContent = "Drug Match" + (drugMatches.length > 0 ? ` (${drugMatches.length})` : "");

  document.getElementById("mechTab").style.display = activeTab === "mech" ? "block" : "none";
  document.getElementById("drugTab").style.display = activeTab === "drug" ? "block" : "none";

  let mhtml = "";
  if (!has) {
    mhtml = `<div class="empty-state">Select observed signs from the left panel. The scoring engine will weigh supporting and conflicting evidence for each mechanism and show the best-fitting patterns here.</div>`;
  } else {
    const primary = sorted[0];
    if (redFlags.length) {
      mhtml += `<div class="disclaimer" style="background:#1a1010;border-color:#4d2020;color:#cf8f8f">⚠ Safety flags:<br>${redFlags.map(x => `• ${x}`).join("<br>")}</div>`;
    }
    if (primary.score > 0) {
      const m = MECHANISMS[primary.mid];
      const supportText = primary.supporting.slice(0, 3).map(x => x.label).join(", ") || "No major supporting signs";
      const conflictText = primary.conflicting.slice(0, 2).map(x => x.label).join(", ");
      mhtml += `<div class="primary-box" style="border-left-color:${m.color}">
        <div class="label">Primary hypothesis</div>
        <div class="name" style="color:${m.color}">${m.label}</div>
        <div class="desc">${m.desc} - Evidence strength: ${confidenceLabel(primary.confidence)} (${primary.score > 0 ? "+" + primary.score : primary.score})</div>
        <div class="drug-notes" style="margin-top:8px;font-style:normal;color:#8f8fa0"><strong>Supporting:</strong> ${supportText}${conflictText ? `<br><strong>Conflicting:</strong> ${conflictText}` : ""}</div>
      </div>`;
    }
    sorted.forEach(row => {
      const m = MECHANISMS[row.mid];
      const score = row.score;
      const bw = score > 0 ? Math.max((score / maxScore) * 100, 3) : score < 0 ? Math.max((Math.abs(score) / Math.abs(minScore || 1)) * 40, 3) : 0;
      const op = score > 0 ? (0.4 + 0.6 * Math.min(score / maxScore, 1)) : 0.6;
      const bg = score > 0 ? m.color : "#442222";
      const side = score > 0 ? "left" : "right";
      const valColor = score > 0 ? (row.confidence > 0.65 ? m.color : "#999") : score < 0 ? "#664444" : "#444";
      mhtml += `<div class="score-row">
        <div class="score-label" style="color:${score > 2 ? "#c0c0cc" : "#666"}">${m.label}</div>
        <div class="score-track">
          ${score !== 0 ? `<div class="score-bar" style="${side}:0;width:${bw}%;background:${bg};opacity:${op}"></div>` : ""}
        </div>
        <div class="score-val" style="font-weight:${score > 5 ? 700 : 400};color:${valColor}">${score > 0 ? "+" + score : score}</div>
      </div>`;
    });
    const topRows = sorted.filter(x => x.score > 0).slice(0, 2);
    if (topRows.length) {
      mhtml += `<div class="unexplained-note"><span>Pattern note: </span>${mechanismPatternNote(sorted)}</div>`;
      topRows.forEach(row => {
        const mech = MECHANISMS[row.mid];
        const support = row.supporting.slice(0, 4).map(x => x.label).join(", ");
        const conflicts = row.conflicting.slice(0, 3).map(x => x.label).join(", ");
        mhtml += `<div class="confidence-note"><strong style="color:${mech.color}">${mech.label}</strong><br>${support ? `Best explained by: ${support}.` : `Few direct supporting signs yet.`}${conflicts ? `<br>Counter-evidence: ${conflicts}.` : ""}</div>`;
      });
    }
  }
  document.getElementById("mechTab").innerHTML = mhtml;

  let dhtml = `<div class="disclaimer">⚠ Educational tool only. Drug matching is approximate and should be treated as a teaching aid, not a diagnostic answer. Mixed exposures, dose, tolerance, route, and timing can distort the pattern.</div>`;
  if (!has) {
    dhtml += `<div class="empty-state">Select observed signs to see which known drug profiles best match your observations.</div>`;
  } else if (drugMatches.length === 0) {
    dhtml += `<div class="uncertain"><div class="title">Uncertain</div><div class="desc">The observed pattern does not fit any stored profile well. That can happen with mixtures, novel compounds, atypical responses, or too few discriminating signs.</div></div>`;
  } else {
    const mixed = drugMatches[1] && Math.abs(drugMatches[0].composite - drugMatches[1].composite) < 8;
    if (mixed) {
      dhtml += `<div class="unexplained-note"><span>Interpretation note: </span>Top matches are close together, so this looks mixed or ambiguous rather than cleanly single-agent.</div>`;
    }
    drugMatches.slice(0, 8).forEach((drug, i) => {
      const pct = Math.round(drug.coverage * 100);
      const isTop = i === 0;
      const pctColor = pct > 70 ? "#F9A03F" : pct > 45 ? "#aaa" : "#666";
      const support = drug.supported.slice(0, 3).map(x => x.label).join(", ");
      const conflict = drug.conflicts.slice(0, 2).map(x => x.label).join(", ");
      const hallmarks = drug.matchedHallmarks.map(sid => getSign(sid)?.label).filter(Boolean).slice(0, 3).join(", ");
      dhtml += `<div class="drug-card ${isTop?"top":""}">
        <div class="drug-header">
          <div><span class="drug-name">${drug.name}</span><span class="drug-class">${drug.class}</span></div>
          <div class="drug-pct" style="color:${pctColor}">${pct}%</div>
        </div>
        <div class="match-track"><div class="match-bar" style="width:${Math.max(pct,3)}%"></div></div>
        <div class="drug-meta">
          <span>⏱ ${drug.duration}</span>
          <span>⚡ onset ${drug.onset}</span>
          <span>${drug.matchedSigns}/${drug.totalExpected} expected signs</span>
          <span>${drug.contradictions} contradictions</span>
        </div>
        <div class="drug-notes">${drug.notes}</div>
        <div class="drug-notes" style="font-style:normal;margin-top:8px">
          ${support ? `<strong>Explained by:</strong> ${support}.<br>` : ""}
          ${hallmarks ? `<strong>Hallmarks matched:</strong> ${hallmarks}.<br>` : ""}
          ${conflict ? `<strong>Conflicts:</strong> ${conflict}.` : ""}
        </div>
      </div>`;
    });
    const top = drugMatches[0];
    if (top.unexplainedIds.length > 0) {
      const labels = top.unexplainedIds.map(s => getSign(s)?.label).filter(Boolean).join(", ");
      dhtml += `<div class="unexplained-note"><span>Signs not explained by top match: </span>${labels}</div>`;
    }
  }
  document.getElementById("drugTab").innerHTML = dhtml;

  let chtml = "";
  if (has) {
    chtml = `<div style="margin-top:16px"><div class="section-label small">Active observations (${selected.size})</div><div class="chips">`;
    selected.forEach(sid => {
      const s = getSign(sid);
      if (s) chtml += `<button class="chip" onclick="toggleSign('${sid}')">${s.label} ×</button>`;
    });
    chtml += `</div></div>`;
  }
  document.getElementById("chipsSection").innerHTML = chtml;
}

// ════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ════════════════════════════════════════════════════════════

function toggleSign(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  render();
}
function toggleCat(id) {
  if (openCats.has(id)) openCats.delete(id); else openCats.add(id);
  render();
}
function clearAll() { selected.clear(); render(); }

document.querySelectorAll(".tab-btn").forEach(b => {
  b.addEventListener("click", () => { activeTab = b.dataset.tab; render(); });
});

document.getElementById("signSearch").addEventListener("input", (e) => {
  signSearch = e.target.value || "";
  renderSigns();
});

// Initial render
render();
</script>
</body>
</html>
